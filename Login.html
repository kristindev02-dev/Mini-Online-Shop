<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log-in Page</title>
    <link rel="stylesheet" href="form.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="arrow_container">
        <a href="index.html" class="arrow"><img src="image/home.png" alt="Home">
        </a>
    </div>
    <div class="form_container">
        <div class="login_page">
            <h3><b>Account Log In</b></h3>
            <form onsubmit="alert('Successfully logged in!'); return false;">
                <input class="input_area" type="email" name="email" id="email" placeholder="Email Address" required
                    pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$" title="Please enter a valid email address.">
                <input class="input_area" type="password" name="password" id="password" placeholder="Password"
                    pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[\W_]).{8,}"
                    title="Password must be at least 8 characters long including [A-z  numbers and special characters(e.g.,!,@,#,$,%).]"
                    required>
                <div class="form_actions">
                    <a href="" class="link">forgot password?</a>
                    <div class="button_row">
                        <button class="form_button" type="submit">Log In</button>
                        <button class="form_button cancel" type="button"
                            onclick="if (confirm('Are you sure you want to cancel?')) window.location.href='index.html';">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
