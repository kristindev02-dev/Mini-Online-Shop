<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>shopping cart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">
</head>

<body>
    <div class="arrow_container">
        <a href="index.html" class="arrow"><img src="image/home.png" alt="Home">
        </a>
    </div>
    <div class="form_container">
    <div class="cart_page">
        <h2 style="text-align: center; padding: 20px;">Shopping Cart</h2>
        <table class="cart_table">
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Subtotal</th>
            </tr>
            <tr>
                <td>Wireless Mouse</td>
                <td style="text-align: center;">
                    <button class="qtybtn">-</button>
                    1
                    <button class="qtybtn">+</button>
                </td>
                <td>45000mmk</td>
            </tr>
            <tr>
                <td>Wireless Headphones</td>
                <td style="text-align: center;">
                    <button class="qtybtn">-</button>
                    1
                    <button class="qtybtn">+</button>
                </td>
                <td>45000 mmk</td>
            </tr>
            <tr>
                <th colspan="2" style="text-align:center;">Total</th>
                <td>90000 mmk</td>
            </tr>
        </table>
        <div class="order_summary">
            <p><span class="order_label">Subtotal</span><span class="order_value">: 90000 mmk</span></p>
            <p><span class="order_label">Shipping</span><span class="order_value">: 5000 mmk</span></p>
            <p><span class="order_label">Total</span><span class="order_value">: 95000 mmk</span></p>
        </div>
        <div class="button_row payment">
            <button class="form_button" onclick="window.location.href='payment.html'">
                Proceed to Payment</button>

            <button class="form_button cancel" type="button"
                onclick="if (confirm('Are you sure you want to cancel?')) window.location.href='index.html';">Cancel</button>
        </div>
    </div>
    </div>
</body>

</html>
